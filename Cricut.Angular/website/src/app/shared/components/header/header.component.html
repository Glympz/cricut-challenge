<header>
    <nav>
        <mat-toolbar class="main-toolbar">
            <div class="nav-title">
                A.C.M.E. Ordering System
            </div>

            @if (viewModel | async; as viewModel) {
                @if (viewModel.isSignedIn) {
                    Welcome, {{ viewModel.usersName }}
                    <a matIconButton class="toolbar-button" routerLink="/" title="Home"><mat-icon>home</mat-icon></a>
                    <button matButton class="toolbar-button" (click)="signOut()">Sign out</button>
                } @else {
                    <a matButton class="toolbar-button" routerLink="/sign-in">Sign-in</a>
                }
            }
        </mat-toolbar>
    </nav>
</header>
