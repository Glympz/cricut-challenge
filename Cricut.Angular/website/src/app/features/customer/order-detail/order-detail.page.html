<h2>Order Details</h2>

@if (viewModel | async; as viewModel) {
    @if (viewModel.order) {
        <div>
            <div>{{ viewModel.order.status }}</div>
            <div>{{ viewModel.order.total }}</div>
            <div><button matButton (click)="deleteOrder(viewModel.order.id)">Delete Order</button></div>
        </div>
    } @else {
        <div>Unable to load order</div>
    }
} @else {
    <div>Loading...</div>
}

<ng-template #deleteOrderConfirmationDialog let-data>
    <h2 mat-dialog-title>Delete Order?</h2>
    <mat-dialog-content>
        Are you sure you want to delete order {{data.orderId}}?
    </mat-dialog-content>
    <mat-dialog-actions>
        <button matButton mat-dialog-close>Cancel</button>
        <button matButton [mat-dialog-close]="true">Delete</button>
    </mat-dialog-actions>
</ng-template>
